name: Keep Neon Database Alive

on:
  schedule:
    # Runs every 5 minutes. 
    # Neon suspends databases after 5 minutes of inactivity on the Free tier.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping-neon-db:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Neon Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret is not set in the GitHub repository settings."
            exit 1
          fi
          
          echo "Pinging Neon database to keep it awake..."
          # The ubuntu-latest runner comes with the psql client pre-installed.
          # We run a simple query to ensure the database stays active.
          psql "$DATABASE_URL" -c "SELECT 1;"
          echo "Database pinged successfully!"
