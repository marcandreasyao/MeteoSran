name: Keep Render Alive
on:
  schedule:
    - cron: '*/5 * * * *' # Pings every 5 minutes (max allowed by GitHub) to combat schedule delays
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -I https://meteosran.onrender.com/ping